<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker — Create Cosmonautics</title>
  <meta name="description" content="Report anomalies, track space telemetry bugs, and review resolutions from the engineering team.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .bug-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .filters-wrap {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .select-cyber {
      background: #000;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .select-cyber:focus {
      border-color: var(--primary);
    }
    .bug-form-container {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      padding: 2rem;
      margin-bottom: 2.5rem;
      border-radius: 4px;
      animation: fadeIn 0.3s ease;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .form-grid-2 {
        grid-template-columns: 1fr;
      }
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--primary);
      text-transform: uppercase;
    }
    .input-cyber {
      background: #000;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 0.6rem;
      font-family: var(--font-headings);
      font-size: 0.9rem;
      outline: none;
    }
    .input-cyber:focus {
      border-color: var(--primary);
    }
    .textarea-cyber {
      background: #000;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 0.6rem;
      font-family: var(--font-headings);
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }
    .textarea-cyber:focus {
      border-color: var(--primary);
    }
    .badge-severity {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
      font-weight: 700;
    }
    .severity-low {
      background: rgba(0, 255, 102, 0.1);
      color: #00ff66;
      border: 1px solid rgba(0, 255, 102, 0.3);
    }
    .severity-medium {
      background: rgba(255, 170, 0, 0.1);
      color: #ffaa00;
      border: 1px solid rgba(255, 170, 0, 0.3);
    }
    .severity-high {
      background: rgba(255, 0, 127, 0.1);
      color: #ff007f;
      border: 1px solid rgba(255, 0, 127, 0.3);
    }
    .badge-status {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
      font-weight: 700;
    }
    .status-open {
      background: rgba(0, 243, 255, 0.1);
      color: var(--primary);
      border: 1px solid rgba(0, 243, 255, 0.3);
    }
    .status-investigating {
      background: rgba(229, 254, 0, 0.1);
      color: #e5fe00;
      border: 1px solid rgba(229, 254, 0, 0.3);
    }
    .status-fixed {
      background: rgba(0, 255, 102, 0.1);
      color: #00ff66;
      border: 1px solid rgba(0, 255, 102, 0.3);
    }
    .bug-details-row {
      display: flex;
      gap: 1.5rem;
      margin: 1rem 0;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .bug-label-value {
      color: var(--text-main);
    }
    .bug-meta-pill {
      border: 1px solid var(--border-light);
      padding: 0.15rem 0.5rem;
      background: rgba(255, 255, 255, 0.01);
    }
  </style>
</head>
<body>

  <!-- Twinkling Particle Canvas -->
  <canvas id="space-canvas"></canvas>

  <!-- Strict Layout Lines -->
  <div class="grid-overlay"></div>

  <!-- Sticky Glass Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo-wrapper">
        <div class="logo-canvas-container" id="logo-viewer">
          <!-- 3D spinning logo canvas loaded by Three.js -->
        </div>
        <span class="logo-text">Cosmonautics</span>
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="downloads.html">Downloads</a>
        <a href="bugs.html" class="active">Bug Tracker</a>
      </nav>
      <a href="downloads.html"><button class="btn-download-nav">Download</button></a>
    </div>
  </header>

  <!-- Bug Tracker Section -->
  <section id="bugs">
    <div class="section-title-wrap">
      <div class="section-subtitle">Diagnostics Terminal</div>
      <h2 class="section-title">Anomaly Reports</h2>
    </div>

    <!-- Header & Action controls -->
    <div class="bug-header-bar">
      <div class="filters-wrap">
        <select class="select-cyber" id="filter-status">
          <option value="all">All Statuses</option>
          <option value="open">Open</option>
          <option value="investigating">Investigating</option>
          <option value="fixed">Fixed</option>
        </select>
        <select class="select-cyber" id="filter-severity">
          <option value="all">All Severities</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <button class="btn-primary" id="btn-report-anomaly">Report Anomaly</button>
    </div>

    <!-- Anomaly Submission Form -->
    <div class="bug-form-container" id="bug-form-container">
      <h3 class="post-title" style="margin-bottom: 1.5rem; font-size: 1.25rem; color: var(--primary);">Submit Telemetry Incident</h3>
      <form id="anomaly-form">
        <div class="form-grid-2">
          <div class="form-group">
            <label for="bug-title">Title / Incident Name</label>
            <input type="text" class="input-cyber" id="bug-title" placeholder="e.g. Vector Thruster heating logic desync" required />
          </div>
          <div class="form-group">
            <label for="bug-version">Mod & Minecraft Version</label>
            <input type="text" class="input-cyber" id="bug-version" placeholder="e.g. Cosmonautics 1.3.8 - MC 1.21.1" required />
          </div>
          <div class="form-group">
            <label for="bug-severity">Severity Rating</label>
            <select class="select-cyber" id="bug-severity" style="padding: 0.6rem;">
              <option value="low">Low (Cosmetic/Minor)</option>
              <option value="medium" selected>Medium (Gameplay/Balance)</option>
              <option value="high">High (Crash/Game breaking)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bug-status">Status (Admin)</label>
            <select class="select-cyber" id="bug-status" style="padding: 0.6rem;" disabled>
              <option value="open" selected>Open</option>
              <option value="investigating">Investigating</option>
              <option value="fixed">Fixed</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="bug-desc">Detailed Description</label>
          <textarea class="textarea-cyber" id="bug-desc" placeholder="Describe what happens and what you observed..." required></textarea>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="bug-steps">Steps to Reproduce</label>
          <textarea class="textarea-cyber" id="bug-steps" placeholder="1. Place Thruster Mount...&#10;2. Apply rotational force...&#10;3. Observe crash log" required></textarea>
        </div>

        <div class="form-group" id="crash-report-group" style="margin-bottom: 2rem; display: none;">
          <label for="bug-crash" style="color: #ff007f;">Crash Report / Stack Trace Log (REQUIRED)</label>
          <textarea class="textarea-cyber" id="bug-crash" placeholder="Paste the content of your crash-reports/crash-*.txt or stack trace here..." style="font-family: var(--font-mono); font-size: 0.8rem; border-color: rgba(255, 0, 127, 0.3); min-height: 120px;"></textarea>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn-secondary" id="btn-cancel-report">Cancel</button>
          <button type="submit" class="btn-primary">File Incident</button>
        </div>
      </form>
    </div>

    <!-- Bugs List Feed -->
    <div class="posts-container" id="bugs-container">
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Syncing diagnostics logs...</div>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="footer-text">
        <p>&copy; 2026 Create Cosmonautics Mod Team. All mechanical components reserved.</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/CosmonauticsTeam/Create-Cosmonautics" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- Three.js Library & OrbitControls -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  
  <!-- App & Model Viewer Scripts -->
  <script src="js/model-viewer.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- Initialize 3D Viewers -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const blocks = [
        { json: 'assets/booster_thruster.json', texture: 'assets/booster_thruster.png', scale: 12, yOffset: -1.5 },
        { json: 'assets/engine_nozzle.json', texture: 'assets/thruster_holder.png', scale: 12, yOffset: -0.8 },
        { json: 'assets/rocket_thruster.json', texture: 'assets/rocket_thruster.png', scale: 12, yOffset: -1.5 },
        { json: 'assets/separator_single.json', texture: 'assets/separator.png', scale: 13, yOffset: -1.5 },
        { json: 'assets/separator.json', texture: 'assets/separator.png', scale: 13, yOffset: -1.5 },
        { json: 'assets/sputnik.json', texture: 'assets/sputnik.png', scale: 12, yOffset: -1.5 },
        { json: 'assets/thruster_mount.json', texture: 'assets/booster_thruster.png', scale: 12, yOffset: -1.5 },
        { json: 'assets/vector_thruster.json', texture: 'assets/vector_thruster.png', scale: 12, yOffset: -1.5 }
      ];
      
      const randomBlock = blocks[Math.floor(Math.random() * blocks.length)];

      window.initMinecraftViewer('logo-viewer', randomBlock.json, randomBlock.texture, {
        controls: false,
        scale: randomBlock.scale,
        yOffset: randomBlock.yOffset
      });
    });
  </script>
</body>
</html>
